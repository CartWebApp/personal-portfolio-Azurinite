<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="contact">
    <header>
        <nav>
            <a href="index.html">Works</a>
            <a href="aboutme.html">About Me</a>
            <a href="resume.html">Resume</a>
            <a href="contact.html">Get In Touch</a>
        </nav>
    </header>

    <main>
        <h1>Want to get in touch?</h1>
        <p id="sendMeAMessage">Send Me a Message!</p>

        <form id="contactForm">
            <div id="nameField" class="contactInputField">
                <label for="yourName">Your Name *</label>
                <input type="text" name="yourName" id="yourName" placeholder="Enter Your Name">
            </div>

            <div id="emailField" class="contactInputField">
                <label for="yourEmail">Your Email *</label>
                <input type="text" name="yourEmail" id="yourEmail" placeholder="Enter Your Email">
            </div>

            <div id="messageField" class="contactInputField">
                <label for="yourMessage">Your Message *</label>
                <input type="text" name="yourMessage" id="yourMessage" placeholder="Enter Your Message">
            </div>

            <button type="submit" id="sendMessage">Send</button>
        </form>
    </main>

    <footer>
        <h2>You may also contact me by these means:</h2>
        <ul>
            <li>
                <img src="Images/ContactLogos/emailImage.png" alt="Email image vector">
                <a href="mailto:ryangip3@gmail.com">ryangip3@gmail.com</a>
            </li>
            <li>
                <img src="Images/ContactLogos/LinkedinLogo.png" alt="LinkedIn logo">
                <a href="https://www.linkedin.com/in/ryangip">https://www.linkedin.com/in/ryangip</a>
            </li>
            <li>
                <img src="Images/ContactLogos/gitHubLogo.png" alt="GitHub logo">
                <a href="https://github.com/Azurinite">https://github.com/Azurinite</a>
            </li>
            <li>
                <img src="Images/ContactLogos/PhoneImage.png" alt="Telephone vector image">
                <a href="tel:+5592939574">559-293-9574</a>
            </li>
        </ul>
    </footer>
</body>
</html>
